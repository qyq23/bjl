<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>百佳蓝｜旗舰版官网</title>
<style>
:root{
--bg:#050505;--glass:rgba(255,255,255,.06);--border:rgba(255,255,255,.12);
--blue:#63a7ff;--cyan:#72ffe3;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,Arial,sans-serif;background:
radial-gradient(circle at 20% 20%,rgba(99,167,255,.12),transparent 40%),
radial-gradient(circle at 80% 60%,rgba(114,255,227,.08),transparent 40%),#050505;
color:#fff;overflow-x:hidden}
.nav{position:fixed;top:18px;left:50%;transform:translateX(-50%);width:min(1400px,92%);
z-index:999;background:var(--glass);backdrop-filter:blur(25px);
border:1px solid var(--border);border-radius:24px;padding:16px 28px;display:flex;justify-content:space-between}
.nav a{color:#fff;text-decoration:none;margin-left:24px}
.hero{height:600vh;position:relative}
.sticky{position:sticky;top:0;height:100vh;overflow:hidden}
#sequenceImg{
position:absolute;
inset:0;
width:100%;
height:100%;
object-fit:cover;
}
.hero-overlay{
position:absolute;
inset:0;
background:linear-gradient(90deg,rgba(0,0,0,.72) 0%,rgba(0,0,0,.45) 35%,rgba(0,0,0,.12) 70%,rgba(0,0,0,.18) 100%);
z-index:1;
}
.left{position:absolute;left:6%;top:50%;transform:translateY(-50%);z-index:5;max-width:720px}
.left h1{font-size:clamp(80px,8vw,160px);font-weight:200;letter-spacing:4px}
.left p{opacity:.8;font-size:20px;margin:20px 0}
.btn{display:inline-block;padding:14px 24px;background:var(--glass);border:1px solid var(--border);border-radius:18px}
.glass{background:var(--glass);backdrop-filter:blur(24px);border:1px solid var(--border);border-radius:28px}
.section{max-width:1400px;margin:auto;padding:120px 30px}
.title{text-align:center;font-size:52px;font-weight:300;margin-bottom:70px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:30px}
.card img{width:100%;height:360px;object-fit:cover;border-radius:24px 24px 0 0}
.card .info{padding:24px}
.detail{display:grid;grid-template-columns:1fr 1fr;gap:30px}
.detail img{width:100%;height:420px;object-fit:cover}
.contact{text-align:center;padding:80px}
.light{position:fixed;width:500px;height:500px;border-radius:50%;pointer-events:none;
background:radial-gradient(circle,rgba(255,255,255,.08),transparent 70%);filter:blur(60px)}
@media(max-width:900px){
#sequenceImg{width:100%;opacity:.7}
.left h1{font-size:52px}
.grid,.detail{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="light" id="light"></div>

<nav class="nav glass">
<div>百佳蓝</div>
<div>
<a href="#products">产品系列</a>
<a href="#brand">品牌实力</a>
<a href="#contact">联系我们</a>
</div>
</nav>

<section class="hero">
<div class="sticky">
<img id="sequenceImg" src="images/frame_001.png"><div class="hero-overlay"></div>
<div class="left">
<h1>百佳蓝</h1>
<p>高端一次性饮品杯解决方案<br>食品级 · 高透光 · 品牌定制</p>
<div class="btn">了解产品</div>
</div>
</div>
</section>

<section class="section" id="brand">
<div class="glass contact">
<h2 class="title">为品牌饮品而生</h2>
<p>专注一次性饮品杯研发与生产，为茶饮、咖啡、果饮品牌提供高品质包装解决方案。</p>
</div>
</section>

<section class="section" id="products">
<h2 class="title">产品系列</h2>
<div class="grid">
<script>
for(let i=1;i<=6;i++){
document.write(`<div class="glass card">
<img src="https://picsum.photos/600/600?random=${i}">
<div class="info"><h3>系列 ${i}</h3><p>食品级PP材质 · 品牌定制</p></div>
</div>`)
}
</script>
</div>
</section>

<section class="section">
<h2 class="title">产品细节</h2>
<div class="detail">
<div class="glass"><img src="https://picsum.photos/900/600?random=21"><div class="info" style="padding:24px">食品级原料</div></div>
<div class="glass"><img src="https://picsum.photos/900/600?random=22"><div class="info" style="padding:24px">加厚杯身结构</div></div>
</div>
</section>

<section class="section" id="contact">
<div class="glass contact">
<h2>联系百佳蓝</h2>
<p>电话：138-0000-0000</p>
<p>微信：BAIJIALAN</p>
<p>邮箱：service@baijialan.com</p>
</div>
</section>

<script>
const totalFrames=302;
const img=document.getElementById('sequenceImg');
const frames=[];
for(let i=1;i<=totalFrames;i++){
 const n=String(i).padStart(3,'0');
 frames.push(`images/frame_${n}.png`);
}
window.addEventListener('scroll',()=>{
 const hero=document.querySelector('.hero');
 const max=hero.offsetHeight-window.innerHeight;
 const p=Math.min(1,Math.max(0,window.scrollY/max));
 img.src=frames[Math.floor(p*(totalFrames-1))];
 document.querySelector('.left').style.opacity=1-p*1.4;
});
document.addEventListener('mousemove',e=>{
 const l=document.getElementById('light');
 l.style.left=(e.clientX-250)+'px';
 l.style.top=(e.clientY-250)+'px';
});
</script>

</body>
</html>
